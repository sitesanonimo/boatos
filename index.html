<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Boatos - Oficial</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        /* CSS CAPRICHADO - O VISUAL QUE VOCÊ GOSTA */
        :root {
            --primary: #ff4757;
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --text: #ffffff;
            --secondary: #2ed573;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { color: var(--primary); text-shadow: 2px 2px 10px rgba(255, 71, 87, 0.3); }

        .container { width: 100%; max-width: 500px; }

        .input-area {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        button#btn-postar {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button#btn-postar:hover { background: #ff6b81; transform: scale(1.02); }

        /* ESTILO DOS CARDS DE BOATOS */
        #mural { width: 100%; }

        .boato {
            background: var(--card);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .boato p { margin: 0; font-size: 17px; line-height: 1.5; color: #ddd; }

        /* BOTÃO DE BANIR - SÓ APARECE PRO ADMIN */
        .btn-banir {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 12px;
            margin-top: 12px;
            cursor: pointer;
            display: none; /* Escondido por padrão */
            font-weight: bold;
        }

        #status-admin {
            background: rgba(46, 213, 115, 0.1);
            color: var(--secondary);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            border: 1px solid var(--secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📣 Mural de Boatos</h1>
        
        <div id="status-admin">🛡️ MODO ADMINISTRADOR ATIVO</div>

        <div class="input-area">
            <input type="text" id="texto" placeholder="O que você ouviu por aí?" maxlength="500">
            <button id="btn-postar" onclick="postar()">ESPALHAR BOATO</button>
        </div>

        <div id="mural">Carregando boatos...</div>
    </div>

    <script>
        // CONFIGURAÇÕES DO SEU FIREBASE (SUBSTITUA PELAS SUAS)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            databaseURL: "https://SEU_PROJETO.firebaseio.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Checar se o Admin está logado para mostrar os botões
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('status-admin').style.display = 'block';
                // Mostra todos os botões de banir se você logar
                setTimeout(() => {
                    document.querySelectorAll('.btn-banir').forEach(b => b.style.display = 'block');
                }, 1000);
            }
        });

        function postar() {
            const campo = document.getElementById('texto');
            if (campo.value.trim() === "") return;

            db.ref('boatos').push({
                texto: campo.value,
                data: Date.now()
            }).then(() => {
                campo.value = "";
            });
        }

        // Carregamento dinâmico do Mural
        db.ref('boatos').orderByChild('data').on('value', snapshot => {
            const mural = document.getElementById('mural');
            mural.innerHTML = "";
            
            let posts = [];
            snapshot.forEach(child => {
                posts.unshift({ id: child.key, ...child.val() }); // Novos no topo
            });

            posts.forEach(p => {
                const isAdmin = auth.currentUser ? 'style="display:block"' : 'style="display:none"';
                mural.innerHTML += `
                    <div class="boato">
                        <p>${p.texto}</p>
                        <button class="btn-banir" ${isAdmin} onclick="banir('${p.id}')">⚠️ BANIR POST</button>
                    </div>
                `;
            });
        });

        function banir(id) {
            if (confirm("Deseja deletar este boato permanentemente?")) {
                db.ref('boatos/' + id).remove()
                    .catch(err => alert("Erro ao deletar: " + err.message));
            }
        }
    </script>
</body>
</html>
