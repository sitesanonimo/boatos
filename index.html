<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Boatos - Anônimo</title>
    <style>
        /* Estilo clássico de Imageboard (4chan Style) */
        body {
            background-color: #f0e0d6; /* Bege clássico */
            color: #800000; /* Vinho/Marrom */
            font-family: arial,helvetica,sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            border-bottom: 2px solid #d9bfb7;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        h1 { font-size: 24px; margin: 0; }
        .subtitle { font-size: 14px; color: #444; }

        /* Mural de Postagens */
        #mural {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 100px; /* Espaço para o formulário fixo */
        }

        /* Estilo de cada postagem (Mural) */
        .post {
            background: #d6daf0; /* Azul acinzentado suave */
            border: 1px solid #b7c5d9;
            padding: 10px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
            max-width: 100%;
            display: inline-block;
            min-width: 300px;
            animation: slideIn 0.3s ease-out;
        }

        .post-header {
            font-size: 12px;
            color: #444;
            margin-bottom: 8px;
            border-bottom: 1px solid #b7c5d9;
            padding-bottom: 4px;
        }

        .post-author { color: #117743; font-weight: bold; }
        .post-id { color: #000; font-weight: normal; }
        .post-content { 
            font-size: 16px; 
            color: #000; 
            word-wrap: break-word; 
            white-space: pre-wrap; 
            line-height: 1.4;
        }

        /* Área de Postagem (Fixa no rodapé) */
        .post-form-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #d9bfb7;
            border-top: 2px solid #800000;
            padding: 15px;
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        .post-form {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        textarea {
            width: 100%;
            height: 60px;
            border: 1px solid #800000;
            padding: 8px;
            font-family: inherit;
            resize: none;
        }

        button {
            background: #800000;
            color: white;
            border: 1px solid #000;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #a00000; }
        button:disabled { background: #666; cursor: not-allowed; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Mobile Adjust */
        @media (max-width: 600px) {
            .post { min-width: 95%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MURAL DE BOATOS</h1>
        <div class="subtitle">Postagens anônimas e em tempo real.</div>
    </header>

    <div id="mural">
        <p style="text-align:center; color:#666;">Conectando ao banco de dados...</p>
    </div>
</div>

<div class="post-form-container">
    <div class="post-form">
        <textarea id="boatoInput" placeholder="Digite seu boato aqui..."></textarea>
        <button id="btnEnviar">POSTAR BOATO</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Configuração fornecida por você
    const firebaseConfig = {
        apiKey: "AIzaSyDZvwPe8iPo9QOZ6Hf1-7XP9wkxvju3Mtw",
        authDomain: "boatos-f241b.firebaseapp.com",
        databaseURL: "https://boatos-f241b-default-rtdb.firebaseio.com",
        projectId: "boatos-f241b",
        storageBucket: "boatos-f241b.firebasestorage.app",
        messagingSenderId: "810347699569",
        appId: "1:810347699569:web:009a1002e27fa6be18aad0",
        measurementId: "G-FKVEBCHXG9"
    };

    // Inicialização
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const boatosRef = ref(db, 'boatos');

    const mural = document.getElementById('mural');
    const input = document.getElementById('boatoInput');
    const btn = document.getElementById('btnEnviar');

    // Função para Enviar
    btn.onclick = async () => {
        const mensagem = input.value.trim();
        if (!mensagem) return alert("O campo está vazio!");

        btn.disabled = true;
        btn.innerText = "POSTANDO...";

        try {
            await push(boatosRef, {
                texto: mensagem,
                data: serverTimestamp()
            });
            input.value = "";
        } catch (error) {
            console.error(error);
            alert("Erro ao postar! Verifique se as Regras do Firebase estão como 'true'.");
        } finally {
            btn.disabled = false;
            btn.innerText = "POSTAR BOATO";
        }
    };

    // Função para Receber Mensagens (Tempo Real)
    let carregando = true;
    onChildAdded(boatosRef, (snapshot) => {
        if (carregando) {
            mural.innerHTML = ""; // Limpa o "Conectando..."
            carregando = false;
        }

        const dados = snapshot.val();
        const dataFormatada = dados.data ? new Date(dados.data).toLocaleString('pt-BR') : "Agora";
        
        // Gera um ID baseado na chave única do Firebase (estilo 4chan)
        const idCurto = snapshot.key.substring(snapshot.key.length - 8);

        const postDiv = document.createElement('div');
        postDiv.className = 'post';
        postDiv.innerHTML = `
            <div class="post-header">
                <span class="post-author">Anônimo</span> 
                <span class="post-id">No.${idCurto}</span> | 
                <span>${dataFormatada}</span>
            </div>
            <div class="post-content">${escapeHTML(dados.texto)}</div>
        `;

        // Adiciona ao topo
        mural.prepend(postDiv);
    });

    // Função para segurança contra ataques de script
    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[m]));
    }
</script>

</body>
</html>
